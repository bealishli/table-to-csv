<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 420px;
      min-height: 200px;
      max-height: 580px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #1d1d1f;
      background: #fff;
      overflow-y: auto;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid #e5e5e7;
      position: sticky;
      top: 0;
      background: #fff;
      z-index: 10;
    }
    .header svg { flex-shrink: 0; }
    .header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    /* Empty state */
    .empty {
      padding: 40px 20px;
      text-align: center;
      color: #86868b;
    }
    .empty svg { margin-bottom: 12px; opacity: 0.4; }
    .empty p { font-size: 14px; }

    /* Table selector */
    .selector-section {
      padding: 12px 16px 8px;
    }
    .selector-section label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #86868b;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .table-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .table-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border: 1.5px solid #e5e5e7;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .table-item:hover {
      border-color: #0071e3;
      background: #f0f5ff;
    }
    .table-item.selected {
      border-color: #0071e3;
      background: #e8f0fe;
    }
    .table-item .badge {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border-radius: 7px;
      background: #f5f5f7;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 12px;
      color: #6e6e73;
    }
    .table-item.selected .badge {
      background: #0071e3;
      color: #fff;
    }
    .table-item .info {
      flex: 1;
      min-width: 0;
    }
    .table-item .info .dim {
      font-size: 13px;
      font-weight: 500;
      color: #1d1d1f;
    }
    .table-item .info .preview-text {
      font-size: 11px;
      color: #86868b;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    /* Preview section */
    .preview-section {
      padding: 0 16px 8px;
    }
    .preview-section .label {
      font-size: 12px;
      font-weight: 500;
      color: #86868b;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 8px;
    }
    .preview-table-wrapper {
      border: 1px solid #e5e5e7;
      border-radius: 10px;
      overflow: hidden;
      max-height: 280px;
      overflow-y: auto;
    }
    .preview-table-wrapper table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    .preview-table-wrapper th {
      background: #f5f5f7;
      font-weight: 600;
      text-align: left;
      padding: 7px 10px;
      border-bottom: 1px solid #e5e5e7;
      position: sticky;
      top: 0;
      z-index: 1;
      white-space: nowrap;
    }
    .preview-table-wrapper td {
      padding: 6px 10px;
      border-bottom: 1px solid #f0f0f2;
      white-space: nowrap;
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .preview-table-wrapper tr:last-child td { border-bottom: none; }
    .more-rows {
      text-align: center;
      padding: 6px;
      font-size: 11px;
      color: #86868b;
      background: #fafafa;
    }

    /* Download button */
    .action-bar {
      padding: 12px 16px 14px;
      position: sticky;
      bottom: 0;
      background: #fff;
      border-top: 1px solid #e5e5e7;
    }
    .btn-download {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: #0071e3;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease;
    }
    .btn-download:hover { background: #0062cc; }
    .btn-download:active { background: #0055b3; }
    .btn-download:disabled {
      background: #c7c7cc;
      cursor: not-allowed;
    }
    .btn-download svg { flex-shrink: 0; }
  </style>
</head>
<body>

  <div class="header">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#0071e3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="2"/>
      <line x1="3" y1="9" x2="21" y2="9"/>
      <line x1="3" y1="15" x2="21" y2="15"/>
      <line x1="9" y1="3" x2="9" y2="21"/>
      <line x1="15" y1="3" x2="15" y2="21"/>
    </svg>
    <h1>Table to CSV</h1>
  </div>

  <div id="content"></div>

  <script src="popup.js"></script>
</body>
</html>
